name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-atriakit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install atriakit
        run: pip install -e .[dev]

      - name: Run tests
        run: pytest -q

  test-ecg-annotator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecg_annotator
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt runtime libraries
        run: sudo apt-get update && sudo apt-get install -y libegl1 libxkbcommon-x11-0 libdbus-1-3

      - name: Install ecg-annotator
        run: pip install -e .[dev]

      - name: Run tests
        run: pytest -q
        env:
          QT_QPA_PLATFORM: offscreen
